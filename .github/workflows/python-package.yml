# Install Python dependencies, run tests and lint with supported Python versions.
# Requires Python >=3.11 as defined in pyproject.toml.

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install package and dev dependencies
      run: pip install -e ".[dev]"

    - name: Lint with flake8
      run: |
        # Stop the build on syntax errors or undefined names
        flake8 cli/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Full lint with project settings
        flake8 cli/ --max-line-length=100 --extend-ignore=E203,W503 --statistics

    - name: Test with pytest
      run: pytest tests/ -v --tb=short --cov=labctl --cov-report=term-missing
