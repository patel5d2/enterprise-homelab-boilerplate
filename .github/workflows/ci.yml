name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (black + flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: black (format check)
        run: black --check cli/

      - name: flake8
        run: flake8 cli/ --max-line-length=100 --extend-ignore=E203,W503

  # ── Unit + integration tests ─────────────────────────────────────────────────
  test:
    name: pytest (${{ matrix.os }} / Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=labctl --cov-report=term-missing

  # ── Bootstrap smoke test (Ubuntu) ───────────────────────────────────────────
  bootstrap-smoke:
    name: Bootstrap smoke test (Docker / Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build smoke-test image
        run: docker build -f Dockerfile.test -t homelab-smoke-test .

      - name: Run smoke tests inside container
        run: docker run --rm homelab-smoke-test
